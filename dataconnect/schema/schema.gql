type User @table {
  email: String!
  name: String!
  companyName: String
}

type Platform @table {
  name: String!
  apiType: String!
  user: User!
}

type Campaign @table {
  name: String!
  status: String!
  startDate: Date!
  budget: Float!
  targetAudience: String
  description: String
  platform: Platform!
}

type Metric @table {
  date: Date!
  impressions: Int64!
  clicks: Int64!
  spend: Float!
  conversions: Int64!
  campaign: Campaign!
}

type Insight @table {
  generatedAt: Timestamp!
  content: String!
  type: String!
  priorityScore: Float
  campaign: Campaign!
}

type Report @table {
  createdAt: Timestamp!
  summaryData: String!
  user: User!
}